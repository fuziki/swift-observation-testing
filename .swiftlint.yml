included:
  - Sources
  - Tests

excluded:
  - .build
  - tools

opt_in_rules:
  - sorted_imports
  - empty_count
  - empty_string
  - first_where
  - last_where
  - toggle_bool
  - modifier_order

disabled_rules:
  - todo

line_length:
  warning: 120
  error: 200
  ignores_comments: true
  ignores_urls: true

vertical_whitespace:
  max_empty_lines: 1

identifier_name:
  min_length:
    warning: 1
